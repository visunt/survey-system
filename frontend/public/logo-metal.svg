<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 暖色系底色 -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6b5344"/>
      <stop offset="100%" stop-color="#4a3728"/>
    </linearGradient>
    <!-- 底色质感 -->
    <linearGradient id="bgTexture" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.1"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="steelGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8e8e8"/>
      <stop offset="15%" stop-color="#ffffff"/>
      <stop offset="30%" stop-color="#d0d0d0"/>
      <stop offset="45%" stop-color="#f5f5f5"/>
      <stop offset="60%" stop-color="#c8c8c8"/>
      <stop offset="75%" stop-color="#f0f0f0"/>
      <stop offset="90%" stop-color="#d8d8d8"/>
      <stop offset="100%" stop-color="#e0e0e0"/>
    </linearGradient>
    <linearGradient id="leatherGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B4513"/>
      <stop offset="20%" stop-color="#A0522D"/>
      <stop offset="40%" stop-color="#6B3E0A"/>
      <stop offset="60%" stop-color="#8B4513"/>
      <stop offset="80%" stop-color="#A0522D"/>
      <stop offset="100%" stop-color="#6B3E0A"/>
    </linearGradient>
    <linearGradient id="leatherHighlight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#D2691E" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#8B4513" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.2"/>
    </linearGradient>
    <radialGradient id="nailGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="30%" stop-color="#e0e0e0"/>
      <stop offset="60%" stop-color="#b0b0b0"/>
      <stop offset="100%" stop-color="#808080"/>
    </radialGradient>
    <radialGradient id="nailShadow" cx="50%" cy="50%" r="50%">
      <stop offset="70%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.4"/>
    </radialGradient>
    <linearGradient id="steelHighlight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="30%" stop-color="#ffffff" stop-opacity="0.6"/>
      <stop offset="60%" stop-color="#ffffff" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="steelShadow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="70%" stop-color="#000000" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="edgeGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.8"/>
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="12" stdDeviation="20" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <filter id="nailInnerShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
      <feOffset dx="1" dy="2" result="offsetBlur"/>
      <feComposite in="SourceGraphic" in2="offsetBlur" operator="over"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="url(#bg)"/>
  <!-- Background texture -->
  <rect width="512" height="512" rx="128" fill="url(#bgTexture)"/>
  
  <!-- 盾牌 - 不锈钢 + 皮质 + 钉子帽 -->
  <g filter="url(#shadow)">
    
    <!-- 外层：盾牌不锈钢 -->
    <path d="M256,60
             L400,125
             L400,280
             C400,360 350,410 256,440
             C162,410 112,360 112,280
             L112,125 Z"
          fill="url(#steelGrad)"/>
    
    <!-- 盾牌高光 -->
    <path d="M256,60
             L400,125
             L400,200
             L112,200
             L112,125 Z"
          fill="url(#steelHighlight)"/>
    
    <!-- 盾牌阴影 -->
    <path d="M256,60
             L400,125
             L400,280
             C400,360 350,410 256,440
             C162,410 112,360 112,280
             L112,125 Z"
          fill="url(#steelShadow)"/>
    
    <!-- 盾牌边缘高光 -->
    <path d="M256,65
             L395,127
             L395,278
             C395,355 348,403 256,432
             C164,403 117,355 117,278
             L117,127 Z"
          stroke="url(#edgeGlow)"
          stroke-width="2.5"
          fill="none"/>
    
    <!-- 中层：皮质 V 形 -->
    <path d="M256,135
             L340,175
             L340,270
             C340,310 300,350 256,380
             C212,350 172,310 172,270
             L172,175 Z"
          fill="url(#leatherGrad)"/>
    
    <!-- 皮质高光 -->
    <path d="M256,140
             L335,178
             L335,268
             C335,305 298,342 256,370
             C214,342 177,305 177,268
             L177,178 Z"
          fill="url(#leatherHighlight)"/>
    
    <!-- 皮质边缘 -->
    <path d="M256,135
             L340,175
             L340,270
             C340,310 300,350 256,380
             C212,350 172,310 172,270
             L172,175 Z"
          stroke="#5D3A1A"
          stroke-width="2"
          fill="none"/>
    
    <!-- 里层：不锈钢 M 形 -->
    <path d="M256,180
             L300,210
             L300,270
             C300,290 280,310 256,330
             C232,310 212,290 212,270
             L212,210 Z"
          fill="url(#steelGrad)"/>
    
    <!-- M 形高光 -->
    <path d="M256,185
             L295,213
             L295,268
             C295,285 278,302 256,320
             C234,302 217,285 217,268
             L217,213 Z"
          stroke="#ffffff"
          stroke-width="1"
          stroke-opacity="0.5"
          fill="none"/>
    
    <!-- 最里层：钉子帽 -->
    <ellipse cx="256" cy="272" rx="22" ry="20" fill="#000000" opacity="0.3"/>
    <circle cx="256" cy="268" r="20" fill="url(#nailGrad)" filter="url(#nailInnerShadow)"/>
    <circle cx="256" cy="268" r="20" fill="none" stroke="#909090" stroke-width="1"/>
    <circle cx="256" cy="268" r="18" fill="url(#nailShadow)"/>
    <ellipse cx="250" cy="262" rx="8" ry="6" fill="#ffffff" opacity="0.7"/>
    <circle cx="248" cy="260" r="3" fill="#ffffff" opacity="0.9"/>
    <circle cx="256" cy="270" r="3" fill="#606060"/>
  </g>
  
  <!-- Accent dots -->
  <circle cx="70" cy="440" r="7" fill="white" opacity="0.5"/>
  <circle cx="92" cy="440" r="5" fill="white" opacity="0.4"/>
  <circle cx="108" cy="440" r="3" fill="white" opacity="0.3"/>
</svg>

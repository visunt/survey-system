<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="whiteGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="12" stdDeviation="20" flood-color="#4338ca" flood-opacity="0.35"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="url(#bg)"/>
  
  <!-- 方案八：盾牌 - 强有力的形状 -->
  <g filter="url(#shadow)">
    <!-- 盾牌外形 -->
    <path d="M256,80
             L400,140
             L400,280
             C400,360 340,420 256,440
             C172,420 112,360 112,280
             L112,140 Z"
          fill="url(#whiteGrad)"/>
    
    <!-- 内部 V 形 -->
    <path d="M256,140
             L340,180
             L340,280
             C340,320 300,360 256,380
             C212,360 172,320 172,280
             L172,180 Z"
          fill="#6366f1" opacity="0.2"/>
    
    <!-- 中心 M 形 -->
    <path d="M256,180
             L300,210
             L300,280
             C300,300 280,320 256,340
             C232,320 212,300 212,280
             L212,210 Z"
          fill="url(#whiteGrad)"/>
    
    <!-- 核心 U 点 -->
    <circle cx="256" cy="280" r="25" fill="#6366f1" opacity="0.3"/>
  </g>
  
  <!-- Accent dots -->
  <circle cx="70" cy="440" r="7" fill="white" opacity="0.5"/>
  <circle cx="92" cy="440" r="5" fill="white" opacity="0.4"/>
  <circle cx="108" cy="440" r="3" fill="white" opacity="0.3"/>
</svg>

<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="whiteGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="12" stdDeviation="20" flood-color="#4338ca" flood-opacity="0.35"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="url(#bg)"/>
  
  <!-- Background depth -->
  <circle cx="256" cy="256" r="200" fill="white" opacity="0.02"/>
  
  <!-- VMU Logo - Abstract geometric design -->
  <!-- Created by tangent circles forming a unified symbol -->
  <g filter="url(#shadow)">
    
    <!-- Abstract VMU symbol - flowing curves from tangent circles -->
    <path d="M256,80
             C340,80 400,140 400,220
             C400,280 360,340 300,360
             L300,360
             C340,340 370,300 370,250
             C370,180 320,130 256,130
             C192,130 142,180 142,250
             C142,300 172,340 212,360
             L212,360
             C152,340 112,280 112,220
             C112,140 172,80 256,80
             Z
             M256,160
             C290,160 320,190 320,230
             C320,270 290,300 256,300
             C222,300 192,270 192,230
             C192,190 222,160 256,160
             Z
             M256,200
             C270,200 280,210 280,230
             C280,250 270,260 256,260
             C242,260 232,250 232,230
             C232,210 242,200 256,200
             Z"
          fill="url(#whiteGrad)"/>
  </g>
  
  <!-- Accent dots -->
  <circle cx="70" cy="440" r="7" fill="white" opacity="0.5"/>
  <circle cx="92" cy="440" r="5" fill="white" opacity="0.4"/>
  <circle cx="108" cy="440" r="3" fill="white" opacity="0.3"/>
</svg>

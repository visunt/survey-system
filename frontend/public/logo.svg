<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <filter id="shadow1" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="-2" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.2"/>
    </filter>
    <filter id="shadow2" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.2"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="url(#bg)"/>
  
  <!-- Overlapping circles pattern - creating VMU silhouette -->
  <g opacity="0.95">
    <!-- V - Created by overlapping circles -->
    <g filter="url(#shadow1)">
      <circle cx="80" cy="150" r="45" fill="white" opacity="0.9"/>
      <circle cx="95" cy="200" r="42" fill="white" opacity="0.85"/>
      <circle cx="110" cy="250" r="40" fill="white" opacity="0.8"/>
      <circle cx="125" cy="300" r="38" fill="white" opacity="0.75"/>
      <circle cx="140" cy="340" r="35" fill="white" opacity="0.7"/>
      <circle cx="155" cy="370" r="30" fill="white" opacity="0.65"/>
      
      <circle cx="190" cy="150" r="45" fill="white" opacity="0.9"/>
      <circle cx="175" cy="200" r="42" fill="white" opacity="0.85"/>
      <circle cx="160" cy="250" r="40" fill="white" opacity="0.8"/>
      <circle cx="145" cy="300" r="38" fill="white" opacity="0.75"/>
    </g>
    
    <!-- M - Created by overlapping circles -->
    <g filter="url(#shadow2)">
      <circle cx="230" cy="150" r="40" fill="white" opacity="0.9"/>
      <circle cx="230" cy="200" r="38" fill="white" opacity="0.85"/>
      <circle cx="230" cy="250" r="36" fill="white" opacity="0.8"/>
      <circle cx="230" cy="300" r="34" fill="white" opacity="0.75"/>
      <circle cx="230" cy="350" r="32" fill="white" opacity="0.7"/>
      
      <circle cx="330" cy="150" r="40" fill="white" opacity="0.9"/>
      <circle cx="330" cy="200" r="38" fill="white" opacity="0.85"/>
      <circle cx="330" cy="250" r="36" fill="white" opacity="0.8"/>
      <circle cx="330" cy="300" r="34" fill="white" opacity="0.75"/>
      <circle cx="330" cy="350" r="32" fill="white" opacity="0.7"/>
      
      <!-- M middle diagonal -->
      <circle cx="260" cy="170" r="30" fill="white" opacity="0.85"/>
      <circle cx="275" cy="200" r="28" fill="white" opacity="0.8"/>
      <circle cx="290" cy="230" r="26" fill="white" opacity="0.75"/>
      <circle cx="305" cy="200" r="28" fill="white" opacity="0.8"/>
      <circle cx="320" cy="170" r="30" fill="white" opacity="0.85"/>
    </g>
    
    <!-- U - Created by overlapping circles -->
    <g filter="url(#shadow1)">
      <circle cx="380" cy="150" r="38" fill="white" opacity="0.9"/>
      <circle cx="380" cy="200" r="36" fill="white" opacity="0.85"/>
      <circle cx="380" cy="250" r="34" fill="white" opacity="0.8"/>
      <circle cx="380" cy="300" r="32" fill="white" opacity="0.75"/>
      
      <circle cx="460" cy="150" r="38" fill="white" opacity="0.9"/>
      <circle cx="460" cy="200" r="36" fill="white" opacity="0.85"/>
      <circle cx="460" cy="250" r="34" fill="white" opacity="0.8"/>
      <circle cx="460" cy="300" r="32" fill="white" opacity="0.75"/>
      
      <!-- U bottom curve -->
      <circle cx="390" cy="330" r="30" fill="white" opacity="0.7"/>
      <circle cx="410" cy="350" r="32" fill="white" opacity="0.75"/>
      <circle cx="430" cy="355" r="34" fill="white" opacity="0.8"/>
      <circle cx="450" cy="350" r="32" fill="white" opacity="0.75"/>
      <circle cx="470" cy="330" r="30" fill="white" opacity="0.7"/>
    </g>
  </g>
  
  <!-- Accent dots -->
  <circle cx="70" cy="430" r="6" fill="white" opacity="0.5"/>
  <circle cx="90" cy="430" r="5" fill="white" opacity="0.4"/>
  <circle cx="106" cy="430" r="4" fill="white" opacity="0.3"/>
</svg>

<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="whiteGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="10" stdDeviation="15" flood-color="#4338ca" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="url(#bg)"/>
  
  <!-- Background depth -->
  <circle cx="256" cy="256" r="200" fill="white" opacity="0.02"/>
  
  <!-- VMU - Single unified shape created by tangent circles -->
  <g filter="url(#shadow)">
    
    <!-- V - Unified shape from tangent circles -->
    <path d="M60,120 
             C60,100 80,100 100,100
             C120,100 130,110 140,130
             L160,200
             L180,130
             C190,110 200,100 220,100
             C240,100 260,100 260,120
             C260,130 255,140 250,150
             L180,350
             C175,370 170,380 160,380
             C150,380 145,370 140,350
             L70,150
             C65,140 60,130 60,120 Z" 
          fill="url(#whiteGrad)"/>
    
    <!-- M - Unified shape from tangent circles -->
    <path d="M250,120
             C250,100 270,100 280,100
             C290,100 300,105 305,115
             L330,160
             L355,115
             C360,105 370,100 380,100
             C390,100 410,100 410,120
             L410,380
             C410,400 390,400 380,400
             C370,400 360,390 360,380
             L360,200
             L330,250
             C325,260 320,265 310,265
             C300,265 295,260 290,250
             L260,200
             L260,380
             C260,400 240,400 230,400
             C220,400 210,390 210,380
             L210,120
             C210,100 230,100 240,100
             C250,100 250,110 250,120 Z"
          fill="url(#whiteGrad)"/>
    
    <!-- U - Unified shape from tangent circles -->
    <path d="M420,120
             C420,100 440,100 450,100
             C460,100 470,110 470,120
             L470,280
             C470,300 475,320 485,335
             C495,350 510,360 530,360
             C550,360 565,350 575,335
             C585,320 590,300 590,280
             L590,120
             C590,100 610,100 620,100
             C630,100 640,110 640,120
             L640,280
             C640,320 630,355 610,380
             C590,405 560,420 530,420
             C500,420 470,405 450,380
             C430,355 420,320 420,280
             L420,120 Z"
          fill="url(#whiteGrad)"/>
  </g>
  
  <!-- Accent dots -->
  <circle cx="70" cy="440" r="7" fill="white" opacity="0.5"/>
  <circle cx="92" cy="440" r="5" fill="white" opacity="0.4"/>
  <circle cx="108" cy="440" r="3" fill="white" opacity="0.3"/>
</svg>

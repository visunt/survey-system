<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="whiteGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#4338ca" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="url(#bg)"/>
  
  <!-- Decorative background circles -->
  <circle cx="90" cy="90" r="100" fill="white" opacity="0.03"/>
  <circle cx="420" cy="420" r="120" fill="white" opacity="0.03"/>
  
  <!-- VMU - Artistic overlapping shapes -->
  <g filter="url(#shadow)">
    <!-- V - Triangle + circles -->
    <g>
      <!-- V main shape -->
      <polygon points="50,120 140,120 200,350 260,120 350,120 230,400 170,400" fill="url(#whiteGrad)"/>
      <!-- V decorative circles -->
      <circle cx="95" cy="120" r="25" fill="white" opacity="0.8"/>
      <circle cx="305" cy="120" r="25" fill="white" opacity="0.8"/>
      <circle cx="200" cy="375" r="30" fill="white" opacity="0.9"/>
      <!-- V inner circles -->
      <circle cx="130" cy="180" r="12" fill="#6366f1" opacity="0.3"/>
      <circle cx="270" cy="180" r="12" fill="#6366f1" opacity="0.3"/>
    </g>
    
    <!-- M - Rectangles + circles -->
    <g>
      <!-- M left bar -->
      <rect x="250" y="120" width="35" height="280" rx="10" fill="url(#whiteGrad)"/>
      <!-- M right bar -->
      <rect x="355" y="120" width="35" height="280" rx="10" fill="url(#whiteGrad)"/>
      <!-- M left diagonal -->
      <rect x="265" y="140" width="28" height="140" rx="8" fill="white" transform="rotate(25, 279, 210)"/>
      <!-- M right diagonal -->
      <rect x="335" y="140" width="28" height="140" rx="8" fill="white" transform="rotate(-25, 349, 210)"/>
      <!-- M decorative circles -->
      <circle cx="267" cy="120" r="18" fill="white" opacity="0.9"/>
      <circle cx="372" cy="120" r="18" fill="white" opacity="0.9"/>
      <!-- M center diamond -->
      <rect x="305" y="195" width="30" height="30" rx="6" fill="white" transform="rotate(45, 320, 210)"/>
      <!-- M inner circles -->
      <circle cx="267" cy="400" r="12" fill="#6366f1" opacity="0.3"/>
      <circle cx="372" cy="400" r="12" fill="#6366f1" opacity="0.3"/>
    </g>
    
    <!-- U - Rectangles + rounded bottom -->
    <g>
      <!-- U left bar -->
      <rect x="410" y="120" width="35" height="200" rx="10" fill="url(#whiteGrad)"/>
      <!-- U right bar -->
      <rect x="490" y="120" width="35" height="200" rx="10" fill="url(#whiteGrad)"/>
      <!-- U bottom -->
      <rect x="410" y="290" width="115" height="55" rx="27" fill="url(#whiteGrad)"/>
      <!-- U decorative circles -->
      <circle cx="427" cy="120" r="18" fill="white" opacity="0.9"/>
      <circle cx="507" cy="120" r="18" fill="white" opacity="0.9"/>
      <!-- U inner circles -->
      <circle cx="467" cy="317" r="20" fill="#6366f1" opacity="0.2"/>
    </g>
  </g>
  
  <!-- Accent elements -->
  <circle cx="70" cy="430" r="8" fill="white" opacity="0.5"/>
  <circle cx="95" cy="430" r="6" fill="white" opacity="0.4"/>
  <circle cx="115" cy="430" r="4" fill="white" opacity="0.3"/>
  
  <!-- Corner accent -->
  <circle cx="450" cy="70" r="6" fill="white" opacity="0.4"/>
  <circle cx="470" cy="90" r="4" fill="white" opacity="0.3"/>
</svg>

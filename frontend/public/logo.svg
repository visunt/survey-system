<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.15"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="url(#bg)"/>
  
  <!-- Decorative circles background -->
  <circle cx="100" cy="100" r="60" fill="white" opacity="0.05"/>
  <circle cx="420" cy="420" r="80" fill="white" opacity="0.05"/>
  <circle cx="400" cy="80" r="40" fill="white" opacity="0.08"/>
  
  <!-- VMU built from basic shapes -->
  <g filter="url(#shadow)">
    <!-- V - Built from triangles and circles -->
    <g fill="white">
      <!-- V left bar -->
      <rect x="60" y="130" width="35" height="200" rx="8" transform="rotate(-15, 77, 230)"/>
      <!-- V right bar -->
      <rect x="175" y="130" width="35" height="200" rx="8" transform="rotate(15, 192, 230)"/>
      <!-- V bottom circle -->
      <circle cx="135" cy="350" r="25"/>
      <!-- V top left circle -->
      <circle cx="75" cy="140" r="18"/>
      <!-- V top right circle -->
      <circle cx="195" cy="140" r="18"/>
    </g>
    
    <!-- M - Built from rectangles and circles -->
    <g fill="white">
      <!-- M left bar -->
      <rect x="220" y="130" width="30" height="220" rx="8"/>
      <!-- M right bar -->
      <rect x="320" y="130" width="30" height="220" rx="8"/>
      <!-- M left diagonal -->
      <rect x="235" y="150" width="25" height="120" rx="8" transform="rotate(25, 247, 210)"/>
      <!-- M right diagonal -->
      <rect x="295" y="150" width="25" height="120" rx="8" transform="rotate(-25, 307, 210)"/>
      <!-- M top circles -->
      <circle cx="235" cy="140" r="15"/>
      <circle cx="335" cy="140" r="15"/>
      <!-- M middle diamond -->
      <rect x="265" y="195" width="20" height="20" rx="4" transform="rotate(45, 275, 205)"/>
    </g>
    
    <!-- U - Built from rectangles and circles -->
    <g fill="white">
      <!-- U left bar -->
      <rect x="370" y="130" width="30" height="180" rx="8"/>
      <!-- U right bar -->
      <rect x="450" y="130" width="30" height="180" rx="8"/>
      <!-- U bottom - rounded rectangle -->
      <rect x="370" y="280" width="110" height="50" rx="25"/>
      <!-- U top circles -->
      <circle cx="385" cy="140" r="15"/>
      <circle cx="465" cy="140" r="15"/>
    </g>
  </g>
  
  <!-- Accent dots -->
  <circle cx="80" cy="420" r="8" fill="white" opacity="0.5"/>
  <circle cx="105" cy="420" r="6" fill="white" opacity="0.4"/>
  <circle cx="125" cy="420" r="4" fill="white" opacity="0.3"/>
  
  <!-- Corner decoration -->
  <circle cx="440" cy="70" r="6" fill="white" opacity="0.4"/>
  <circle cx="460" cy="90" r="4" fill="white" opacity="0.3"/>
</svg>

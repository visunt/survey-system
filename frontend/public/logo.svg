<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="whiteGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0f4ff"/>
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#4338ca" flood-opacity="0.25"/>
    </filter>
    <clipPath id="vClip">
      <path d="M0,0 L512,0 L512,512 L0,512 Z"/>
    </clipPath>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="url(#bg)"/>
  
  <!-- Decorative background circles -->
  <circle cx="80" cy="80" r="120" fill="white" opacity="0.03"/>
  <circle cx="432" cy="432" r="140" fill="white" opacity="0.03"/>
  
  <!-- VMU - Built with tangent circles (Apple logo style) -->
  <g filter="url(#shadow)">
    
    <!-- V - Tangent circles forming V shape -->
    <g fill="url(#whiteGrad)">
      <!-- V left side circles -->
      <circle cx="95" cy="140" r="38"/>
      <circle cx="108" cy="195" r="35"/>
      <circle cx="121" cy="250" r="32"/>
      <circle cx="134" cy="300" r="29"/>
      <circle cx="147" cy="345" r="26"/>
      <circle cx="160" cy="380" r="22"/>
      
      <!-- V right side circles -->
      <circle cx="225" cy="140" r="38"/>
      <circle cx="212" cy="195" r="35"/>
      <circle cx="199" cy="250" r="32"/>
      <circle cx="186" cy="300" r="29"/>
      <circle cx="173" cy="345" r="26"/>
      
      <!-- V bottom connecting circle -->
      <circle cx="160" cy="400" r="28"/>
    </g>
    
    <!-- M - Tangent circles forming M shape -->
    <g fill="url(#whiteGrad)">
      <!-- M left vertical -->
      <circle cx="270" cy="140" r="32"/>
      <circle cx="270" cy="195" r="30"/>
      <circle cx="270" cy="250" r="28"/>
      <circle cx="270" cy="305" r="26"/>
      <circle cx="270" cy="355" r="24"/>
      <circle cx="270" cy="395" r="22"/>
      
      <!-- M right vertical -->
      <circle cx="390" cy="140" r="32"/>
      <circle cx="390" cy="195" r="30"/>
      <circle cx="390" cy="250" r="28"/>
      <circle cx="390" cy="305" r="26"/>
      <circle cx="390" cy="355" r="24"/>
      <circle cx="390" cy="395" r="22"/>
      
      <!-- M left diagonal -->
      <circle cx="285" cy="160" r="24"/>
      <circle cx="300" cy="185" r="22"/>
      <circle cx="315" cy="210" r="20"/>
      
      <!-- M right diagonal -->
      <circle cx="375" cy="160" r="24"/>
      <circle cx="360" cy="185" r="22"/>
      <circle cx="345" cy="210" r="20"/>
      
      <!-- M center peak -->
      <circle cx="330" cy="170" r="26"/>
    </g>
    
    <!-- U - Tangent circles forming U shape -->
    <g fill="url(#whiteGrad)">
      <!-- U left vertical -->
      <circle cx="435" cy="140" r="30"/>
      <circle cx="435" cy="195" r="28"/>
      <circle cx="435" cy="250" r="26"/>
      <circle cx="435" cy="300" r="24"/>
      
      <!-- U right vertical -->
      <circle cx="505" cy="140" r="30"/>
      <circle cx="505" cy="195" r="28"/>
      <circle cx="505" cy="250" r="26"/>
      <circle cx="505" cy="300" r="24"/>
      
      <!-- U bottom curve -->
      <circle cx="445" cy="335" r="24"/>
      <circle cx="460" cy="360" r="26"/>
      <circle cx="480" cy="375" r="28"/>
      <circle cx="500" cy="360" r="26"/>
      <circle cx="515" cy="335" r="24"/>
    </g>
  </g>
  
  <!-- Accent dots -->
  <circle cx="70" cy="440" r="7" fill="white" opacity="0.5"/>
  <circle cx="92" cy="440" r="5" fill="white" opacity="0.4"/>
  <circle cx="108" cy="440" r="3" fill="white" opacity="0.3"/>
  
  <!-- Corner accent -->
  <circle cx="445" cy="70" r="5" fill="white" opacity="0.4"/>
  <circle cx="462" cy="87" r="3" fill="white" opacity="0.3"/>
</svg>
